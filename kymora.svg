    <path d="M107 62c-8 25-27 40-51 40-16 0-29-7-38-20" stroke-width="11"/>
    <path d="M34 36c21 9 45 27 66 56" stroke-width="7"/>
  </g>
  <g opacity="0.98" fill="none" stroke="url(#kymora-logo-orbit)" stroke-linecap="round" filter="url(#kymora-logo-orbit-shadow)">
    <path d="M27 66c9-24 27-38 50-38 16 0 29 7 39 19" stroke-width="8"/>
    <path d="M107 62c-8 25-27 40-51 40-16 0-29-7-38-20" stroke-width="8"/>
    <path d="M34 36c21 9 45 27 66 56" stroke-width="5" opacity="0.58"/>
  </g>
  <g transform="translate(9 7) scale(0.88)">
    <path
      d="M39 31h20v32l31-32h25L79 67l38 30H91L59 72v25H39z"
      transform="translate(8 9)"
      fill="#000A23"
      opacity="0.46"
      filter="url(#kymora-logo-soft-shadow)"
    />
    <path
      d="M39 31h20v32l31-32h25L79 67l38 30H91L59 72v25H39z"
      transform="translate(5 6)"
      fill="url(#kymora-logo-side)"
      opacity="0.96"
    />
    <path
      d="M39 31h20v32l31-32h25L79 67l38 30H91L59 72v25H39z"
      fill="url(#kymora-logo-k)"
      stroke="url(#kymora-logo-bevel)"
