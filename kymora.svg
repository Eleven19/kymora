  <rect x="8" y="8" width="112" height="112" rx="27" fill="url(#kymora-logo-bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="27" fill="url(#kymora-logo-bg-glow)"/>
  <rect x="12" y="12" width="104" height="104" rx="24" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <g opacity="0.48" fill="none" stroke="#000A23" stroke-linecap="round" transform="translate(6 7)" filter="url(#kymora-logo-orbit-shadow)">
