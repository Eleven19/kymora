<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 128" role="img" aria-labelledby="title desc">
  <title id="title">Kymora logo</title>
  <desc id="desc">Kymora wordmark with a rounded three-dimensional blue and violet K icon.</desc>
  <defs>
    <linearGradient id="kymora-logo-bg" x1="18" y1="110" x2="110" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000A23"/>
      <stop offset="0.55" stop-color="#07153B"/>
      <stop offset="1" stop-color="#4E46E0"/>
    </linearGradient>
    <radialGradient id="kymora-logo-bg-glow" cx="78" cy="35" r="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E46E0" stop-opacity="0.52"/>
      <stop offset="0.42" stop-color="#0563FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000A23" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kymora-logo-orbit" x1="22" y1="42" x2="108" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89DDFF"/>
      <stop offset="0.5" stop-color="#0563FF"/>
      <stop offset="1" stop-color="#9D97F0"/>
    </linearGradient>
    <linearGradient id="kymora-logo-side" x1="56" y1="34" x2="105" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#112A70"/>
      <stop offset="0.55" stop-color="#0451D8"/>
      <stop offset="1" stop-color="#000A23"/>
    </linearGradient>
    <linearGradient id="kymora-logo-k" x1="38" y1="31" x2="91" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#DDEBFF"/>
      <stop offset="1" stop-color="#89DDFF"/>
    </linearGradient>
    <linearGradient id="kymora-logo-bevel" x1="36" y1="31" x2="95" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#89DDFF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="kymora-logo-text" x1="142" y1="31" x2="402" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000A23"/>
      <stop offset="0.55" stop-color="#332CB8"/>
      <stop offset="1" stop-color="#0563FF"/>
    </linearGradient>
    <filter id="kymora-logo-orbit-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="6" dy="8" stdDeviation="5" flood-color="#000A23" flood-opacity="0.52"/>
      <feDropShadow dx="-2" dy="-2" stdDeviation="2" flood-color="#89DDFF" flood-opacity="0.2"/>
    </filter>
    <filter id="kymora-logo-dot-shadow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="5" dy="7" stdDeviation="3" flood-color="#000A23" flood-opacity="0.46"/>
    </filter>
    <filter id="kymora-logo-shadow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#000A23" flood-opacity="0.54"/>
      <feDropShadow dx="8" dy="9" stdDeviation="4" flood-color="#000A23" flood-opacity="0.32"/>
    </filter>
    <filter id="kymora-logo-soft-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
