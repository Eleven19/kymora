  <circle cx="35" cy="88" r="6" fill="#000A23" opacity="0.38" filter="url(#kymora-logo-dot-shadow)"/>
  <circle cx="104" cy="45" r="7" fill="#89DDFF" filter="url(#kymora-logo-dot-shadow)"/>
