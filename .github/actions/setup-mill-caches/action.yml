name: Setup Mill caches
description: Restore/save dependency caches for Mill builds

runs:
  using: composite
  steps:
    - name: Cache Coursier
      uses: actions/cache@v4
      with:
        path: ~/.cache/coursier
        key: ${{ runner.os }}-coursier-${{ github.workflow }}-${{ github.job }}-${{ hashFiles('build.mill.yaml', 'kymora/**/package.mill', 'kymora/**/package.mill.yaml', 'mill-build/**') }}
        restore-keys: |
          ${{ runner.os }}-coursier-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-coursier-
