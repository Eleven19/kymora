name: Deploy Site

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Link browser bundle
        run: ./mill kymora.website-bundle.js.fullLinkJS

      - name: Render site
        run: ./mill kymora.website.jvm.run --out "$GITHUB_WORKSPACE/site" --repo-root "$GITHUB_WORKSPACE" --base-path "/kymora"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
