name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
    paths-ignore:
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/CODEOWNERS"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Check formatting
        run: ./mill kymora.vfs.jvm.checkFormat

  build:
    name: Build & Test (JVM / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `./mill` is a POSIX launcher that refuses to run on Windows; the
          # bundled `mill.bat` is the Windows entry point.
          - os: ubuntu-latest
            mill: "./mill"
            cache-platform: jvm
          - os: windows-latest
            mill: "./mill.bat"
            cache-platform: jvm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Setup Mill remote cache
        uses: actions/cache@v4
        with:
          path: .mill-remote-cache
          key: ${{ runner.os }}-mill-remote-${{ matrix.cache-platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-mill-remote-${{ matrix.cache-platform }}-

      - name: Compile JVM modules
        run: ${{ matrix.mill }} --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-${{ matrix.cache-platform }} kymora.vfs.jvm.compile + kymora.workflow.jvm.compile + kymora.workflow-testkit.jvm.compile + kymora.examples.jvm.compile

      - name: Run JVM tests
        run: ${{ matrix.mill }} --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-${{ matrix.cache-platform }} kymora.vfs.jvm.test + kymora.workflow.jvm.test + kymora.workflow-testkit.jvm.test + kymora.examples.jvm.test

  build-js:
    name: Build & Test (Scala.js)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Setup Mill remote cache
        uses: actions/cache@v4
        with:
          path: .mill-remote-cache
          key: ${{ runner.os }}-mill-remote-js-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-mill-remote-js-

      - name: Compile JS modules
        run: ./mill --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-js kymora.vfs.js.compile + kymora.workflow.js.compile + kymora.workflow-testkit.js.compile

      - name: Run JS tests
        run: ./mill --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-js kymora.vfs.js.test + kymora.workflow.js.test + kymora.workflow-testkit.js.test

  build-native:
    name: Build & Test (Scala Native)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Scala Native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libunwind-dev libgc-dev

      - name: Setup Mill caches
        uses: ./.github/actions/setup-mill-caches

      - name: Setup Mill remote cache
        uses: actions/cache@v4
        with:
          path: .mill-remote-cache
          key: ${{ runner.os }}-mill-remote-native-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-mill-remote-native-

      - name: Compile Native modules
        run: ./mill --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-native kymora.vfs.native.compile + kymora.workflow.native.compile + kymora.workflow-testkit.native.compile

      - name: Run Native tests
        run: ./mill --remote-cache-location .mill-remote-cache --remote-cache-filter __.compile --remote-cache-salt ${{ runner.os }}-native kymora.vfs.native.test + kymora.workflow.native.test + kymora.workflow-testkit.native.test
