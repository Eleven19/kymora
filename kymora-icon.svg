    </filter>
    <filter id="kymora-shadow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#000A23" flood-opacity="0.54"/>
      <feDropShadow dx="8" dy="9" stdDeviation="4" flood-color="#000A23" flood-opacity="0.32"/>
    </filter>
    <filter id="kymora-soft-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
