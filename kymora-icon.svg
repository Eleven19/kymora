<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Kymora icon</title>
  <desc id="desc">A rounded navy three-dimensional K mark with blue and violet orbit strokes.</desc>
  <defs>
    <linearGradient id="kymora-bg" x1="18" y1="110" x2="110" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000A23"/>
      <stop offset="0.55" stop-color="#07153B"/>
      <stop offset="1" stop-color="#4E46E0"/>
    </linearGradient>
    <radialGradient id="kymora-bg-glow" cx="78" cy="35" r="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E46E0" stop-opacity="0.52"/>
      <stop offset="0.42" stop-color="#0563FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000A23" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kymora-orbit" x1="22" y1="42" x2="108" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89DDFF"/>
      <stop offset="0.5" stop-color="#0563FF"/>
      <stop offset="1" stop-color="#9D97F0"/>
    </linearGradient>
    <linearGradient id="kymora-side" x1="56" y1="34" x2="105" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#112A70"/>
      <stop offset="0.55" stop-color="#0451D8"/>
      <stop offset="1" stop-color="#000A23"/>
    </linearGradient>
    <linearGradient id="kymora-k" x1="38" y1="31" x2="91" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
