    <path d="M104 62c-8 25-27 40-51 40-16 0-29-7-38-20" stroke-width="11"/>
    <path d="M31 36c21 9 45 27 66 56" stroke-width="7"/>
  </g>
  <g opacity="0.98" fill="none" stroke="url(#kymora-orbit)" stroke-linecap="round" filter="url(#kymora-orbit-shadow)">
    <path d="M24 66c9-24 27-38 50-38 16 0 29 7 39 19" stroke-width="8"/>
    <path d="M104 62c-8 25-27 40-51 40-16 0-29-7-38-20" stroke-width="8"/>
    <path d="M31 36c21 9 45 27 66 56" stroke-width="5" opacity="0.58"/>
