      <stop offset="1" stop-color="#89DDFF"/>
    </linearGradient>
    <linearGradient id="kymora-bevel" x1="36" y1="31" x2="95" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#89DDFF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="kymora-orbit-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
